        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-intern-request'
      responses:
        '200':
          description: Intern updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/intern-response'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: Intern not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

    delete:
      tags:
        - Interns
      summary: Delete intern
      operationId: deleteIntern
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Intern deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: Intern not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /interns/{id}/progress:
    get:
      tags:
        - Interns
      summary: Get intern progress
      operationId: getInternProgress
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/intern-progress-response'
        '401':
