  /interns/{id}/tasks:
    get:
      tags:
        - Interns
      summary: Get intern tasks
      operationId: getInternTasks
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ pending, in_progress, submitted, on_review, needs_rework, completed, rejected ]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/task-list-response'
        '401':
          description: Unauthorized
