          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: Mentor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  # ==================== Tasks ====================
  /tasks:
    get:
      tags:
        - Tasks
      summary: Get list of tasks
      operationId: getTasks
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
