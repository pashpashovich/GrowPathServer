                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /users/{id}/unblock:
    post:
      tags:
        - Users
      summary: Unblock user
      description: Unblock a user by ID
      operationId: unblockUser
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      responses:
        '200':
          description: User unblocked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-status-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /users/{id}/role:
    patch:
      tags:
        - Users
      summary: Change user role
      description: Change the role of a user
      operationId: changeUserRole
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/change-role-request'
      responses:
        '200':
          description: User role changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-role-response'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /users/{id}/invite:
    post:
      tags:
        - Users
      summary: Send invitation to user
      description: Send an invitation to a user
      operationId: inviteUser
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      responses:
        '200':
          description: Invitation sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/invitation-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  # ==================== Interns ====================
  /interns:
    get:
      tags:
        - Interns
      summary: Get list of interns
      description: Retrieve a paginated list of interns
      operationId: getInterns
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: search
          in: query
          description: Search by name
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ active, completed, paused ]
        - name: rating
          in: query
          schema:
            type: number
            format: double
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/intern-list-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

    post:
      tags:
        - Interns
      summary: Create intern
      description: Create a new intern
      operationId: createIntern
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-intern-request'
      responses:
        '201':
          description: Intern created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/intern-response'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

