                $ref: '#/components/schemas/intern-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: Intern not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

    put:
