openapi: 3.0.3
info:
  title: GrowPath API
  description: Complete API specification for GrowPath Server
  version: 1.0.0
  contact:
    name: GrowPath Team
    email: support@growpath.com

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /profile:
    get:
      tags:
        - Profile
      summary: Get current user profile
      description: Retrieve the profile of the currently authenticated user
      operationId: getCurrentUserProfile
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-profile-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
    put:
      tags:
        - Profile
      summary: Update current user profile
      description: Update firstName, lastName, patronymicName, and phoneNumber of the currently authenticated user
      operationId: updateCurrentUserProfile
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-profile-request'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-profile-response'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /profile/avatar/presign-upload:
    post:
      tags:
        - Profile
      summary: Get presigned URL for avatar upload
      description: Generates a presigned URL for uploading user avatar. The objectKey (UUID) is saved immediately.
      operationId: presignAvatarUpload
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Presigned URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/presign-avatar-upload-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /profile/avatar:
    get:
      tags:
        - Profile
      summary: Download user avatar
      description: Downloads the avatar file from MinIO storage
      operationId: downloadAvatar
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Avatar file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: Avatar not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
    delete:
      tags:
        - Profile
      summary: Delete user avatar
      description: Removes the avatar from user profile (sets avatarUrl to null)
      operationId: deleteAvatar
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Avatar deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /auth/complete-registration:
    post:
      tags:
        - Auth
      summary: Complete registration using invitation token
      description: |
        Validates the one-time token and sets the user's permanent password in Keycloak.
        Public endpoint (no JWT required).
      operationId: completeRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/complete-registration-request'
      responses:
        '200':
          description: Registration completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message-response'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '422':
          description: Invalid or expired registration token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '503':
          description: Keycloak integration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset email
      description: |
        If an account exists for the email, sends a message with a one-time reset link.
        Always returns success without revealing whether the email is registered.
        Public endpoint (no JWT required).
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/forget-password-request'
      responses:
        '204':
          description: Request accepted (no response body)
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password using email link token
      description: Validates the one-time token from the reset link and sets the new password.
        Public endpoint (no JWT required).
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/reset-password-request'
      responses:
        '204':
          description: Password updated successfully
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '422':
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '503':
          description: Keycloak integration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /users:
    get:
      tags:
        - Users
      summary: Get list of users
      description: Retrieve a paginated list of users with optional filtering
      operationId: getUsers
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: role
          in: query
          description: Filter by role
          required: false
          schema:
            type: string
            enum: [ admin, hr, mentor, intern, department_head ]
        - name: status
          in: query
          description: Filter by status
          required: false
          schema:
            type: string
            enum: [ active, blocked, pending ]
        - name: search
          in: query
          description: Search by name or email
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-list-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

    post:
      tags:
        - Users
      summary: Create a new user
      description: Create a new user with pending status
      operationId: createUser
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-user-request'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-response'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve a user by their unique identifier
      operationId: getUserById
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

    put:
      tags:
        - Users
      summary: Update user
      description: Update user information
      operationId: updateUser
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-user-request'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-response'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete a user by ID
      operationId: deleteUser
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

  /users/{id}/block:
    post:
      tags:
        - Users
      summary: Block user
      description: Block a user by ID
      operationId: blockUser
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      responses:
