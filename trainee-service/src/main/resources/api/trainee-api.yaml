  /tasks/{id}/status:
    patch:
      tags:
        - Tasks
      summary: Change task status (explicit transition)
      description: |
        Single endpoint for board/DnD column moves. Provide target status in `to` or an `action` alias
        (`take`/`start` → in_progress, `submit` → on_review, `accept`/`approve` → completed, `rework` → needs_rework).
        Server validates role, current state, and required payload; returns 409 if the transition is not allowed
        from the current state, 422 if the transition is understood but the request is semantically invalid.
      operationId: patchTaskStatus
      security:
        - bearerAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/change-task-status-request'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/task-status-response'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '403':
          description: Forbidden for this role or task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '409':
          description: Transition not allowed from current status (or wrong actor for this transition)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '422':
          description: Semantic validation failed (e.g. missing links for submit, missing score for accept)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'

