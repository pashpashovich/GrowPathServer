<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Восстановление пароля GrowPath</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.5; color: #333; max-width: 560px; margin: 0 auto; padding: 24px; }
    .greeting { font-size: 18px; margin-bottom: 16px; }
    .text { margin-bottom: 24px; }
    .button { display: inline-block; background: #2563eb; color: #fff !important; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; margin: 16px 0; }
    .button:hover { background: #1d4ed8; }
    .link { color: #2563eb; word-break: break-all; }
    .footer { margin-top: 32px; font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <p class="greeting" th:text="${greeting}">Здравствуйте!</p>
  <p class="text">Вы запросили восстановление пароля для аккаунта GrowPath. Нажмите кнопку ниже, чтобы задать новый пароль.</p>
  <p class="text">Логин: <span th:text="${email}"></span></p>
  <p><a th:href="${resetLink}" class="button" th:text="'Сбросить пароль'">Сбросить пароль</a></p>
  <p class="text" th:if="${resetLink}">Если кнопка не работает, скопируйте ссылку в браузер: <span class="link" th:text="${resetLink}"></span></p>
  <p class="footer">Если вы не запрашивали сброс пароля, проигнорируйте это письмо.</p>
</body>
</html>
