spring:
  application:
    name: notification-service
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5433/NOTIFICATION_DB}
    username: ${NOTIFICATION_DB_USERNAME:postgres}
    password: ${NOTIFICATION_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${JPA_FORMAT_SQL:true}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_NOTIFICATION_GROUP_ID:notification-service-group}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8090}/realms/${KEYCLOAK_REALM:growpath}
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8090}/realms/${KEYCLOAK_REALM:growpath}/protocol/openid-connect/certs

server:
  port: ${NOTIFICATION_SERVICE_PORT:8082}

management:
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}
    db:
      enabled: ${DB_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.kafka: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

springdoc:
  override-with-generic-response: false
  packages-to-scan: by.bsuir.growpathserver.notification
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  attachment-bucket-name: ${MINIO_EMAIL_ATTACHMENT_BUCKET_NAME:growpath-email-attachments}
  gateway-url: ${MINIO_GATEWAY_URL:http://localhost:8080/api/v1/storage}

mailersend:
  from-email: pavel.kosovich2004@gmail.com

app:
  registration-base-url: ${REGISTRATION_BASE_URL:http://localhost:3000}
  password-reset-base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:3000}
  mailing:
    scheduler-cron: ${MAILING_SCHEDULER_CRON:0 * * * * *}
  trainee-service:
    url: ${TRAINEE_SERVICE_URL:http://localhost:8081}

kafka:
  topic:
    user-invited: ${KAFKA_TOPIC_USER_INVITED:USER_INVITED}
    application-created: ${KAFKA_TOPIC_APPLICATION_CREATED:APPLICATION_CREATED}
    task-completed: ${KAFKA_TOPIC_TASK_COMPLETED:TASK_COMPLETED}
    password-reset-requested: ${KAFKA_TOPIC_PASSWORD_RESET_REQUESTED:PASSWORD_RESET_REQUESTED}
    user-blocked: ${KAFKA_TOPIC_USER_BLOCKED:USER_BLOCKED}
